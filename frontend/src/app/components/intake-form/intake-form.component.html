<div class="fixed inset-0 z-50 flex items-center justify-center bg-[#4b1248]/80 backdrop-blur-sm p-4">
  <div class="bg-[#fdf6f3] rounded-3xl w-full max-w-2xl overflow-hidden shadow-2xl relative">
    
    <!-- Confirmation Screen -->
    <div *ngIf="isSubmitted" class="p-12 text-center">
      <div class="flex justify-center mb-6">
        <svg class="w-20 h-20 text-[#ff5757]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      </div>
      <h2 class="text-3xl font-serif text-[#4b1248] mb-4">Congratulations, {{formData.brideName}} & {{formData.groomName}}!</h2>
      <p class="text-gray-600 mb-8">Thank you for choosing ShaadiMe. We are going to take care of everything. Enjoy the process.</p>
      <button (click)="close.emit()" class="w-full py-4 bg-[#ff5757] text-white rounded-full font-medium hover:bg-[#ff5757]/90 transition-colors">
        Close
      </button>
    </div>

    <!-- Form Steps -->
    <div *ngIf="!isSubmitted">
      <!-- Progress Bar -->
      <div class="h-2 bg-gray-200 w-full">
        <div class="h-full bg-[#ff5757] transition-all duration-300" [style.width.%]="progress"></div>
      </div>

      <button (click)="close.emit()" class="absolute top-6 right-6 text-gray-400 hover:text-gray-600">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
      </button>

      <div class="p-8 md:p-12">
        <div class="min-h-[300px] flex flex-col justify-center">
          <span class="text-[#ff5757] font-medium mb-2">Step {{currentStep + 1}} of {{steps.length}}</span>
          <h2 class="text-3xl font-serif text-[#4b1248] mb-8">{{steps[currentStep].title}}</h2>

          <!-- Step 0: Names -->
          <div *ngIf="currentStep === 0" class="space-y-4">
            <input type="text" [(ngModel)]="formData.brideName" placeholder="Bride's First Name" class="w-full p-4 rounded-xl border-2 border-gray-100 focus:border-[#fad6d6] outline-none transition-colors">
            <input type="text" [(ngModel)]="formData.groomName" placeholder="Groom's First Name" class="w-full p-4 rounded-xl border-2 border-gray-100 focus:border-[#fad6d6] outline-none transition-colors">
          </div>

          <!-- Step 1: Phone -->
          <div *ngIf="currentStep === 1">
            <input type="tel" [(ngModel)]="formData.phone" placeholder="10-digit mobile number" class="w-full p-4 rounded-xl border-2 border-gray-100 focus:border-[#fad6d6] outline-none transition-colors">
          </div>

          <!-- Step 2: Date -->
          <div *ngIf="currentStep === 2" class="space-y-4">
            <input type="date" [(ngModel)]="formData.date" class="w-full p-4 rounded-xl border-2 border-gray-100 focus:border-[#fad6d6] outline-none transition-colors">
            <button (click)="formData.date = 'Not decided yet'" [ngClass]="{'border-[#ff5757] bg-[#ff5757]/5': formData.date === 'Not decided yet'}" class="w-full p-4 rounded-xl border-2 border-gray-100 transition-colors text-left">
              Not decided yet
            </button>
          </div>

          <!-- Step 3: Budget -->
          <div *ngIf="currentStep === 3" class="grid grid-cols-1 gap-3">
            <button *ngFor="let opt of ['Under 5 Lakh', '5 to 15 Lakh', '15 to 30 Lakh', '30 Lakh and above', 'Flexible']" 
                    (click)="formData.budget = opt" [ngClass]="{'border-[#ff5757] bg-[#ff5757]/5': formData.budget === opt}" 
                    class="p-4 rounded-xl border-2 border-gray-100 transition-colors text-left">
              {{opt}}
            </button>
          </div>

          <!-- Step 4: Type -->
          <div *ngIf="currentStep === 4" class="grid grid-cols-1 gap-3">
            <button *ngFor="let opt of ['Arranged Marriage', 'Love Marriage']" 
                    (click)="formData.type = opt" [ngClass]="{'border-[#ff5757] bg-[#ff5757]/5': formData.type === opt}" 
                    class="p-4 rounded-xl border-2 border-gray-100 transition-colors text-left">
              {{opt}}
            </button>
          </div>

          <!-- Step 5: Guests -->
          <div *ngIf="currentStep === 5" class="grid grid-cols-1 gap-3">
            <button *ngFor="let opt of ['Under 100', '100 to 300', '300 to 600', '600 to 1000', 'Above 1000']" 
                    (click)="formData.guests = opt" [ngClass]="{'border-[#ff5757] bg-[#ff5757]/5': formData.guests === opt}" 
                    class="p-4 rounded-xl border-2 border-gray-100 transition-colors text-left">
              {{opt}}
            </button>
          </div>

          <!-- Step 6: Preference -->
          <div *ngIf="currentStep === 6" class="grid grid-cols-1 gap-3">
            <button *ngFor="let opt of ['I want to be involved in every detail', 'I want to share my vision and let ShaadiMe handle the rest', 'Take care of everything, I trust ShaadiMe completely']" 
                    (click)="formData.preference = opt" [ngClass]="{'border-[#ff5757] bg-[#ff5757]/5': formData.preference === opt}" 
                    class="p-4 rounded-xl border-2 border-gray-100 transition-colors text-left">
              {{opt}}
            </button>
          </div>

          <!-- Step 7: Inspiration -->
          <div *ngIf="currentStep === 7" class="border-2 border-dashed border-gray-200 rounded-2xl p-12 text-center">
            <svg class="w-12 h-12 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
            <p class="text-gray-500">Upload up to 10 photos (JPG, PNG, PDF)</p>
            <input type="file" multiple class="hidden" id="file-upload">
            <label for="file-upload" class="mt-4 inline-block px-6 py-2 bg-gray-100 rounded-full cursor-pointer hover:bg-gray-200 transition-colors">
              Browse Files
            </label>
          </div>

          <!-- Step 8: City -->
          <div *ngIf="currentStep === 8" class="grid grid-cols-1 gap-3">
            <button *ngFor="let opt of ['Bengaluru', 'Chennai', 'Hyderabad']" 
                    (click)="formData.city = opt" [ngClass]="{'border-[#ff5757] bg-[#ff5757]/5': formData.city === opt}" 
                    class="p-4 rounded-xl border-2 border-gray-100 transition-colors text-left">
              {{opt}}
            </button>
          </div>
        </div>

        <div class="mt-12 flex justify-between items-center">
          <button (click)="back()" [disabled]="currentStep === 0" class="flex items-center text-gray-400 hover:text-[#4b1248] disabled:opacity-0 transition-all">
            <svg class="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            Back
          </button>
          <button (click)="next()" [disabled]="isLoading" class="px-8 py-4 bg-[#ff5757] text-white rounded-full font-medium flex items-center hover:bg-[#ff5757]/90 transition-all shadow-lg shadow-[#ff5757]/20 disabled:opacity-50">
            <span *ngIf="!isLoading">{{currentStep === steps.length - 1 ? 'Finish' : 'Next Step'}}</span>
            <span *ngIf="isLoading" class="flex items-center">
              <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Processing...
            </span>
            <svg *ngIf="!isLoading" class="w-5 h-5 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
