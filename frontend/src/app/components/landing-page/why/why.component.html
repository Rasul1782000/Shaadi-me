<section id="why" class="landing-section landing-section-dark">
  <div class="landing-container">
    <div class="section-heading">
      <p class="section-eyebrow section-eyebrow-dark">Why ShaadiMe</p>
      <h2 class="section-title section-title-dark">Built so you can show up as a guest at your own wedding</h2>
    </div>

    <p-divider styleClass="landing-divider-dark"></p-divider>

    <div class="why-grid">
      <p-card *ngFor="let card of cards" styleClass="landing-card landing-card-dark why-card">
        <ng-template pTemplate="content">
          <p class="why-number">{{ card.number }}</p>
          <h3>{{ card.title }}</h3>
          <p>{{ card.description }}</p>
        </ng-template>
      </p-card>
    </div>
  </div>
</section>
