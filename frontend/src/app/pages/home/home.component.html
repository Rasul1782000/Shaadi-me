<main class="landing-page">
  <app-hero
    [slides]="heroSlides"
    [stats]="heroStats"
    [activeIndex]="activeHeroIndex"
    (activeIndexChange)="setActiveHero($event)"
    (startPlanning)="plannerUi.open()"
    (exploreThemes)="scrollToThemes()"
  ></app-hero>

  <app-cities [cities]="cities"></app-cities>
  <app-decor [styles]="decorStyles"></app-decor>
  <app-themes [themes]="themes"></app-themes>
  <app-why [cards]="whyCards"></app-why>
  <app-venues [venues]="venues"></app-venues>
  <app-faq [items]="faqs" (startPlanning)="plannerUi.open()"></app-faq>

  <app-intake-form *ngIf="plannerUi.isOpen()" (close)="plannerUi.close()"></app-intake-form>
</main>
